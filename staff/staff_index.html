<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>うましかスタンプ - スタッフ専用パネル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        .qr-modal { display: none; }
        .qr-modal.active { display: flex; }
        #qrcode img { margin: 0 auto; border: 8px solid white; border-radius: 8px; }
        .page { display: none; }
        .page.active { display: block; }
        .tab { flex: 1; padding: 14px; text-align: center; font-size: 14px; color: #94a3b8; font-weight: bold; cursor: pointer; }
        .tab.active { color: #005bac; border-top: 3px solid #005bac; background: #f8fafc; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen pb-16">

    <header class="p-6 text-center border-b border-slate-800 bg-slate-900 sticky top-0 z-10">
        <h1 class="text-xl font-bold tracking-widest text-yellow-500">うましかスタンプ</h1>
        <p class="text-xs text-slate-400 mt-1">スタッフ専用パネル</p>
    </header>

    <!-- タブ -->
    <!-- ページ：ポイント発行 -->
    <div id="page-point" class="page active">
        <main class="p-4 space-y-4">
            <div class="text-sm text-slate-400 px-2 pb-2">発行する項目を選択してください：</div>

            <button onclick="showQR('観劇', 2)" class="w-full bg-slate-800 border border-slate-700 p-6 rounded-2xl flex items-center justify-between active:scale-95 transition-transform">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-yellow-500/20 rounded-full flex items-center justify-center">
                        <i class="fa-solid fa-masks-theater text-yellow-500 text-xl"></i>
                    </div>
                    <div class="text-left">
                        <div class="font-bold text-lg text-slate-100">観劇</div>
                        <div class="text-xs text-slate-400">受付にて提示</div>
                    </div>
                </div>
                <div class="bg-yellow-500 text-slate-900 font-bold px-3 py-1 rounded-full text-sm">+2 pt</div>
            </button>

            <button onclick="showQR('ワークショップ', 1)" class="w-full bg-slate-800 border border-slate-700 p-6 rounded-2xl flex items-center justify-between active:scale-95 transition-transform">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-sky-500/20 rounded-full flex items-center justify-center">
                        <i class="fa-solid fa-people-group text-sky-500 text-xl"></i>
                    </div>
                    <div class="text-left">
                        <div class="font-bold text-lg text-slate-100">ワークショップ</div>
                        <div class="text-xs text-slate-400">WS参加時</div>
                    </div>
                </div>
                <div class="bg-sky-500 text-white font-bold px-3 py-1 rounded-full text-sm">+1 pt</div>
            </button>

            <button onclick="showQR('グッズ購入', 1)" class="w-full bg-slate-800 border border-slate-700 p-6 rounded-2xl flex items-center justify-between active:scale-95 transition-transform">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-emerald-500/20 rounded-full flex items-center justify-center">
                        <i class="fa-solid fa-bag-shopping text-emerald-500 text-xl"></i>
                    </div>
                    <div class="text-left">
                        <div class="font-bold text-lg text-slate-100">グッズ購入</div>
                        <div class="text-xs text-slate-400">物販コーナー</div>
                    </div>
                </div>
                <div class="bg-emerald-500 text-white font-bold px-3 py-1 rounded-full text-sm">+1 pt</div>
            </button>
        </main>
    </div>

    <!-- ページ：特典承認 -->
    <div id="page-coupon" class="page">
        <main class="p-4 space-y-4">
            <div id="coupon-scan-section">
                <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6">
                    <h2 class="font-bold text-lg text-slate-100 mb-2">特典の交換・承認</h2>
                    <p class="text-xs text-slate-400 mb-4">お客様が提示したQRコードをLINEカメラで読み取ります</p>
                    <button onclick="startCouponScanner()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-2xl text-lg">
                        📷 QRコードを読み取る
                    </button>
                </div>
            </div>

            <div id="coupon-result-section" style="display:none;">
                <div class="bg-white text-slate-900 rounded-2xl p-6">
                    <h2 class="font-bold text-lg mb-4">交換内容の確認</h2>
                    <table style="width:100%; border-collapse:collapse;">
                        <tr style="border-bottom:1px solid #e2e8f0;">
                            <th style="padding:10px 0; color:#64748b; font-weight:normal; text-align:left; width:35%;">特典内容</th>
                            <td style="padding:10px 0; font-weight:bold;" id="res-reward">---</td>
                        </tr>
                        <tr style="border-bottom:1px solid #e2e8f0;">
                            <th style="padding:10px 0; color:#64748b; font-weight:normal; text-align:left;">予約者名</th>
                            <td style="padding:10px 0; font-weight:bold;" id="res-name">---</td>
                        </tr>
                        <tr style="border-bottom:1px solid #e2e8f0;">
                            <th style="padding:10px 0; color:#64748b; font-weight:normal; text-align:left;">LINE名</th>
                            <td style="padding:10px 0; font-weight:bold;" id="res-line">---</td>
                        </tr>
                        <tr>
                            <th style="padding:10px 0; color:#64748b; font-weight:normal; text-align:left;">消費pt</th>
                            <td style="padding:10px 0; font-weight:bold; color:#e53e3e;" id="res-pts">---</td>
                        </tr>
                    </table>
                    <button id="btn-submit" onclick="submitApproval()" style="width:100%; background:#10b981; color:#fff; font-weight:bold; padding:16px; border:none; border-radius:12px; font-size:16px; margin-top:16px; cursor:pointer;">
                        この特典の利用を承認する
                    </button>
                    <button onclick="restartCouponScanner()" style="width:100%; background:#f1f5f9; color:#64748b; font-weight:bold; padding:12px; border:none; border-radius:12px; font-size:14px; margin-top:8px; cursor:pointer;">
                        キャンセル
                    </button>
                </div>
            </div>

            <div id="coupon-msg" style="display:none; text-align:center; padding:12px; border-radius:8px; font-weight:bold;"></div>
        </main>
    </div>

    <!-- ページ：利用履歴 -->
    <div id="page-history" class="page">
        <main class="p-4">
            <div class="bg-white text-slate-900 rounded-2xl p-5">
                <h2 class="font-bold text-lg mb-3">特典の利用履歴</h2>
                <button onclick="loadHistory()" style="width:100%; background:#f1f5f9; color:#334155; padding:10px; border:none; border-radius:8px; font-size:14px; margin-bottom:15px; cursor:pointer;">
                    🔄 最新データを取得
                </button>
                <div id="history-list">
                    <p style="font-size:13px; color:#94a3b8; text-align:center;">上のボタンでデータを取得してください</p>
                </div>
            </div>
        </main>
    </div>

    <!-- ポイント発行用QRモーダル -->
    <div id="qr-modal" class="qr-modal fixed inset-0 bg-slate-950/90 z-50 flex-col items-center justify-center p-6 backdrop-blur-sm">
        <div class="w-full max-w-sm bg-white rounded-3xl p-8 text-slate-900 text-center shadow-2xl">
            <div id="modal-title" class="text-2xl font-bold mb-1">観劇</div>
            <div id="modal-pts" class="text-sm font-bold text-yellow-600 mb-6">+2 pt を付与</div>
            <div id="qrcode" class="flex justify-center mb-8"></div>
            <p class="text-xs text-slate-400 mb-8 leading-relaxed">
                お客様のカメラでスキャンしてください。<br>1人1回のみ有効です。
            </p>
            <button onclick="hideQR()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-4 rounded-2xl transition-colors">
                閉じる
            </button>
        </div>
    </div>

    <!-- タブナビゲーション -->
    <div style="position:fixed; bottom:0; left:0; width:100%; background:#fff; display:flex; border-top:1px solid #e2e8f0; z-index:50;">
        <div class="tab active" id="tab-point" onclick="switchTab('point')">ポイント発行</div>
        <div class="tab" id="tab-coupon" onclick="switchTab('coupon')">特典承認</div>
        <div class="tab" id="tab-history" onclick="switchTab('history')">利用履歴</div>
    </div>

    <script>
        // ===== 設定 =====
        const LIFF_ID_CUSTOMER = '2010459570-8NHozdMT'; // お客様用LIFF
        const LIFF_ID_STAFF    = '2010459570-R8A7lcll';  // スタッフ用LIFF
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxoKyVIAZfpHYh4JLh9iOfH3zHZ347IWmmDom_uZ6oD78zWJr0rqacXX2dDsKUENwo4/exec';

        let currentToken = null;

        // スタッフ用LIFFを初期化
        liff.init({ liffId: LIFF_ID_STAFF }).catch(err => {
            console.warn("スタッフLIFF初期化失敗（ブラウザ表示では正常）:", err);
        });

        // ===== タブ切替 =====
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            document.getElementById('page-' + tabId).classList.add('active');
            if (tabId === 'history') loadHistory();
        }

        // ===== ポイント発行QR =====
        function showQR(name, pts) {
            document.getElementById('modal-title').innerText = name;
            document.getElementById('modal-pts').innerText = "+" + pts + " pt を付与";

            // liff.state方式でevent_idをLIFFに確実に渡す
            const params = 'action=add_points&points=' + pts + '&event_id=' + encodeURIComponent(name);
            const targetUrl = 'https://liff.line.me/' + LIFF_ID_CUSTOMER + '?liff.state=' + encodeURIComponent('?' + params);

            document.getElementById('qrcode').innerHTML = '';
            new QRCode(document.getElementById("qrcode"), {
                text: targetUrl,
                width: 240,
                height: 240,
                colorDark: "#0f172a",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.L
            });

            document.getElementById('qr-modal').classList.add('active');
            if (window.navigator.vibrate) window.navigator.vibrate(50);
        }

        function hideQR() {
            document.getElementById('qr-modal').classList.remove('active');
        }

        // ===== 特典承認スキャン =====
        async function startCouponScanner() {
            showCouponMsg('', '');

            // LIFFから開いていない場合はLIFFのURLにリダイレクト
            if (!liff.isInClient()) {
                window.location.href = 'https://liff.line.me/' + LIFF_ID_STAFF;
                return;
            }

            if (!liff.isLoggedIn()) { liff.login(); return; }

            if (liff.scanCodeV2) {
                try {
                    const result = await liff.scanCodeV2();
                    if (result && result.value) {
                        verifyCoupon(result.value);
                    }
                } catch(e) {
                    showCouponMsg('QRの読み取りがキャンセルされました', 'error');
                }
            } else {
                showCouponMsg('この端末ではLINEのQRリーダーがサポートされていません', 'error');
            }
        }

        async function verifyCoupon(token) {
            currentToken = token;
            document.getElementById('coupon-scan-section').style.display = 'none';
            showCouponMsg('データを照合中...', 'info');

            try {
                const res = await gasPost({ action: 'verify_coupon_api', token: token });
                hideCouponMsg();
                if (res.success) {
                    document.getElementById('res-reward').innerText = res.reward_label;
                    document.getElementById('res-name').innerText   = res.reservation_name;
                    document.getElementById('res-line').innerText   = res.display_name;
                    document.getElementById('res-pts').innerText    = res.use_points + ' pt';
                    document.getElementById('coupon-result-section').style.display = 'block';
                } else {
                    showCouponMsg(res.error, 'error');
                    restartCouponScanner();
                }
            } catch(e) {
                showCouponMsg('通信エラーが発生しました', 'error');
                restartCouponScanner();
            }
        }

        async function submitApproval() {
            if (!currentToken) return;
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.innerText = '処理中...';

            try {
                const res = await gasPost({ action: 'approve_coupon', token: currentToken });
                if (res.success) {
                    document.getElementById('coupon-result-section').style.display = 'none';
                    showCouponMsg('✅ 承認完了！お客様の画面が「使用済」に切り替わりました', 'success');
                    setTimeout(() => restartCouponScanner(), 3000);
                } else {
                    showCouponMsg(res.error, 'error');
                    btn.disabled = false;
                    btn.innerText = 'この特典の利用を承認する';
                }
            } catch(e) {
                showCouponMsg('通信エラー', 'error');
                btn.disabled = false;
                btn.innerText = 'この特典の利用を承認する';
            }
        }

        function restartCouponScanner() {
            document.getElementById('coupon-result-section').style.display = 'none';
            document.getElementById('coupon-scan-section').style.display = 'block';
            currentToken = null;
            const btn = document.getElementById('btn-submit');
            btn.disabled = false;
            btn.innerText = 'この特典の利用を承認する';
        }

        // ===== 利用履歴 =====
        async function loadHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = '<p style="text-align:center; font-size:13px; color:#94a3b8;">読み込み中...</p>';
            try {
                const res = await gasPost({ action: 'get_reward_history' });
                if (res.success) {
                    if (res.data.length === 0) {
                        list.innerHTML = '<p style="text-align:center; font-size:13px; color:#94a3b8;">まだ履歴はありません</p>';
                        return;
                    }
                    list.innerHTML = res.data.map(h => `
                        <div style="background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px; padding:12px; margin-bottom:10px;">
                            <div style="font-size:12px; color:#64748b;">${h.date}</div>
                            <div style="font-size:15px; font-weight:bold; color:#0f172a; margin:4px 0;">👤 ${h.reservation_name} 様</div>
                            <div style="font-size:13px; color:#0369a1; background:#e0f2fe; display:inline-block; padding:2px 8px; border-radius:4px;">
                                ${h.reward} (${h.pts > 0 ? '+' : ''}${h.pts}pt)
                            </div>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = `<p style="color:red; text-align:center;">エラー: ${res.error}</p>`;
                }
            } catch(err) {
                list.innerHTML = '<p style="color:red; text-align:center;">通信エラー</p>';
            }
        }

        // ===== ユーティリティ =====
        async function gasPost(data) {
            const res = await fetch(GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(data)
            });
            return res.json();
        }

        function showCouponMsg(msg, type) {
            const box = document.getElementById('coupon-msg');
            if (!msg) { box.style.display = 'none'; return; }
            box.style.display = 'block';
            box.style.background = type === 'error' ? '#fee2e2' : type === 'success' ? '#d1fae5' : '#e0f2fe';
            box.style.color = type === 'error' ? '#991b1b' : type === 'success' ? '#065f46' : '#0369a1';
            box.innerText = msg;
        }

        function hideCouponMsg() { showCouponMsg('', ''); }

        window.onpopstate = function() { hideQR(); };
    </script>
</body>
</html>
